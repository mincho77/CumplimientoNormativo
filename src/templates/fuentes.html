<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Fuentes Normativas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background: var(--bg-gray); padding: 20px; font-family: var(--font-family); transition: background 0.2s; }
        .source-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--elevation-dp1); border: 1px solid var(--gray-200); }
        body.dark-theme .source-card { background: #001263; }
        .source-info { flex: 1; }
        .btn-delete { background: var(--alert-error); color: white; border: none; padding: 8px 16px; border-radius: 9999px; cursor: pointer; font-weight: 600; font-size: 0.85em; }
        .btn-edit { background: var(--color-primary); color: white; border: none; padding: 8px 16px; border-radius: 9999px; cursor: pointer; margin-right: 8px; font-weight: 600; font-size: 0.85em; transition: background 0.2s; }
        .btn-edit:hover { background: var(--color-secondary); }
        .add-form { background: white; padding: 25px; border-radius: 16px; margin-bottom: 30px; box-shadow: var(--elevation-dp2); border: 1px solid var(--gray-200); }
        body.dark-theme .add-form { background: #001263; }
        input[type="text"] { padding: 12px 16px; border: 1px solid var(--gray-200); border-radius: 12px; background: var(--bg-5); font-size: 0.9em; outline: none; transition: all 0.2s; }
        body.dark-theme input[type="text"] { background: #00003F; color: white; }
        input[type="text"]:focus { border-color: var(--color-primary); background: white; box-shadow: var(--focus-halo); }

        /* Modal for editing */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 20px; width: 500px; box-shadow: var(--elevation-dp5); animation: slideIn 0.3s; }
        body.dark-theme .modal-content { background: #001263; color: white; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
    <script src="{{ url_for('static', filename='sura-ui.js') }}"></script>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto;">
        <div class="app-bar">
            <div class="app-bar__brand">
                <img src="{{ url_for('static', filename='sura-logo.svg') }}" alt="SURA" class="brand-logo">
                <div class="app-bar__divider"></div>
                <div class="app-bar__titles">
                    <h1><span class="ic ic-link"></span> Fuentes Normativas</h1>
                    <p class="subtitle">Gestión de enlaces semilla para el monitoreo</p>
                </div>
            </div>
            <div class="app-bar__actions">
                <div class="theme-switch" id="theme-toggle" title="Cambiar tema" style="margin-right: 12px;">
                    <div class="theme-switch__btn light active" id="theme-light">
                        <span class="ic ic-sun"></span>
                    </div>
                    <div class="theme-switch__btn dark" id="theme-dark">
                        <span class="ic ic-moon"></span>
                    </div>
                </div>
                <a href="/" class="btn-back" style="margin:0;"><span class="ic ic-arrow-left"></span> Volver al Dashboard</a>
            </div>
        </div>

        <div class="add-form">
            <h3 class="section-title" style="margin-top:0;"><span class="ic ic-plus-circle"></span> Añadir Nueva Fuente</h3>
            <div style="display: flex; gap: 15px; align-items: flex-end; margin-top: 15px;">
                <div style="flex: 1;">
                    <label style="display:block; font-size:0.75em; font-weight:700; color:var(--gray-500); text-transform:uppercase; margin-bottom:8px;">Nombre de la Entidad</label>
                    <input type="text" id="new-entidad" placeholder="Ej: Ministerio de Salud" style="width: 100%;">
                </div>
                <div style="flex: 2;">
                    <label style="display:block; font-size:0.75em; font-weight:700; color:var(--gray-500); text-transform:uppercase; margin-bottom:8px;">URL Semilla (Enlace de Normatividad)</label>
                    <input type="text" id="new-enlace" placeholder="https://..." style="width: 100%;">
                </div>
                <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="new-sox" style="width:18px; height:18px; cursor:pointer;">
                    <label for="new-sox" style="font-size:0.9em; font-weight:600; color:var(--gray-900); cursor:pointer;">SOX</label>
                </div>
                <div style="margin-bottom: 2px;">
                    <button onclick="manageSource('add')" class="btn-primary" style="height:46px;">Añadir Fuente</button>
                </div>
            </div>
        </div>

        <div id="sources-list">
            {% for f in fuentes %}
            <div class="source-card">
                <div class="source-info">
                    <strong style="color:var(--gray-900); font-size: 1.1em;"><span class="ic ic-building" style="color:var(--color-primary);"></span> {{ f.Entidad }}</strong>
                    <span style="font-size: 0.85em; color: var(--gray-500); word-break: break-all; display: block; margin-top: 6px;" id="enlace-{{ loop.index }}">{{ f.Enlace }}</span>
                </div>
                <div style="flex-shrink: 0; display: flex; gap: 8px;">
                    <button class="btn-edit" onclick="openEditSourceModal('{{ f.Entidad }}', '{{ f.Enlace }}')"><span class="ic ic-edit"></span> Editar</button>
                    <button class="btn-delete" onclick="promptDelete('{{ f.Entidad }}')"><span class="ic ic-trash"></span></button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editSourceModal" class="modal">
        <div class="modal-content">
            <h3 class="section-title" style="margin-top:0;"><span class="ic ic-edit"></span> Editar Enlace</h3>
            <p id="edit-entidad-name" style="font-weight:700; margin-bottom:20px; color:var(--color-secondary);"></p>
            
            <div class="form-group" style="margin-bottom:25px;">
                <label style="display:block; font-size:0.75em; font-weight:700; color:var(--gray-500); text-transform:uppercase; margin-bottom:8px;">Nueva URL Semilla</label>
                <input type="text" id="edit-enlace-input" style="width: 100%;">
            </div>

            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button onclick="closeEditModal()" class="btn-secondary">Cancelar</button>
                <button id="btn-save-edit" class="btn-primary">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Logic for Theme Toggle
            const themeToggle = document.getElementById('theme-toggle');
            const themeLight = document.getElementById('theme-light');
            const themeDark = document.getElementById('theme-dark');

            function setTheme(theme) {
                if (theme === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeDark.classList.add('active');
                    themeLight.classList.remove('active');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-theme');
                    themeLight.classList.add('active');
                    themeDark.classList.remove('active');
                    localStorage.setItem('theme', 'light');
                }
            }

            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme) setTheme(savedTheme);
            else if (systemPrefersDark) setTheme('dark');

            themeToggle.addEventListener('click', () => {
                const currentTheme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
                setTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        });

        function promptDelete(entidad) {
            showConfirm('Eliminar Fuente', '¿Seguro que deseas eliminar esta fuente?', () => {
                manageSource('delete', entidad);
            }, 'Eliminar');
        }

        function manageSource(action, entidad = '') {
            let data = { action: action };

            if (action === 'add') {
                data.entidad = $('#new-entidad').val();
                data.enlace = $('#new-enlace').val();
                data.sox = $('#new-sox').is(':checked') ? 'X' : '';

                if (!data.entidad || !data.enlace) {
                    showToast('Completa el nombre y el enlace de la entidad', 'warning');
                    return;
                }
            } else if (action === 'delete') {
                data.entidad = entidad;
            }

            $.ajax({
                url: '/api/update_fuente',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function() {
                    showToast('Operación exitosa', 'success');
                    setTimeout(() => location.reload(), 1000);
                }
            });
        }

        let currentEditingEntidad = '';

        function openEditSourceModal(entidad, currentEnlace) {
            currentEditingEntidad = entidad;
            $('#edit-entidad-name').text(entidad);
            $('#edit-enlace-input').val(currentEnlace);
            $('#editSourceModal').show();
            
            $('#btn-save-edit').off('click').on('click', function() {
                const newEnlace = $('#edit-enlace-input').val().trim();
                if (newEnlace && newEnlace !== currentEnlace) {
                    $.ajax({
                        url: '/api/update_fuente',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            action: 'edit',
                            old_entidad: currentEditingEntidad,
                            entidad: currentEditingEntidad,
                            enlace: newEnlace
                        }),
                        success: function() {
                            location.reload();
                        }
                    });
                } else {
                    closeEditModal();
                }
            });
        }

        function closeEditModal() {
            $('#editSourceModal').hide();
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('editSourceModal')) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
