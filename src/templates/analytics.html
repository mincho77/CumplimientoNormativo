<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analítica - Cumplimiento Normativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }
        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--elevation-dp2);
            transition: background-color 0.3s ease;
        }
        .chart-card h3 {
            margin-top: 0;
            color: #0D0D0D;
            text-align: center;
            margin-bottom: 20px;
        }
        body.dark-theme .chart-card {
            background: #001263; /* Fondo de superficie en dark mode SURA */
            border: 1px solid var(--gray-200);
        }
        body.dark-theme .chart-card h3 {
            color: #81B1FF;
        }
    </style>
    <script src="{{ url_for('static', filename='sura-ui.js') }}"></script>
</head>
<body>
    <div class="container">
        <a href="/" class="btn-back"><span class="ic ic-arrow-left"></span> Volver al Dashboard</a>

        <div class="app-bar">
            <div class="app-bar__brand">
                <img src="{{ url_for('static', filename='sura-logo.svg') }}" alt="SURA" class="brand-logo">
                <div class="app-bar__divider"></div>
                <div class="app-bar__titles">
                    <h1><span class="ic ic-bar-chart"></span> Analítica y Estadísticas</h1>
                    <p class="subtitle">Distribución general de la normativa y métricas de Inteligencia Artificial</p>
                </div>
            </div>
            <div class="app-bar__actions">
                <div class="theme-switch" id="theme-toggle" title="Cambiar tema" style="margin-right: 12px;">
                    <div class="theme-switch__btn light active" id="theme-light">
                        <span class="ic ic-sun"></span>
                    </div>
                    <div class="theme-switch__btn dark" id="theme-dark">
                        <span class="ic ic-moon"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>Distribución por Semáforo</h3>
                <div style="max-height: 400px; position: relative;">
                    <canvas id="chart-semaforo"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Top 10 Entidades con más Hallazgos</h3>
                <div style="max-height: 400px; position: relative;">
                    <canvas id="chart-entidades"></canvas>
                </div>
            </div>
        </div>

        <div class="charts-grid" style="margin-top: 50px; margin-bottom: 50px;">
            <div class="chart-card">
                <h3>Distribución Nuevos Hoy</h3>
                <div style="max-height: 400px; position: relative;">
                    <canvas id="chart-semaforo-hoy"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Top 10 Entidades Nuevas Hoy</h3>
                <div style="max-height: 400px; position: relative;">
                    <canvas id="chart-entidades-hoy"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartSemaforo, chartEntidades, chartSemaforoHoy, chartEntidadesHoy;
        let lastCasosData = null;

        function updateCharts(casos) {
            if (!casos) return;
            lastCasosData = casos;
            const isDark = document.body.classList.contains('dark-theme');
            const labelColor = isDark ? '#FFFFFF' : '#000000';
            
            // Helper to render Doughnut
            const renderDoughnut = (ctxId, chartObj, dataFiltered) => {
                const semaforo_counts = { ROJO: 0, AMARILLO: 0, VERDE: 0, CONSOLIDADO: 0 };
                dataFiltered.forEach(c => {
                    const sem = (c.semaforo || '').toUpperCase();
                    if (sem in semaforo_counts) semaforo_counts[sem]++;
                });

                const ctx = document.getElementById(ctxId).getContext('2d');
                if (chartObj) chartObj.destroy();
                return new Chart(ctx, {
                    type: 'doughnut',
                    plugins: [ChartDataLabels],
                    data: {
                        labels: ['ALERTA', 'PENDIENTE', 'CUMPLIDO', 'ARCHIVADO'],
                        datasets: [{
                            data: [semaforo_counts.ROJO, semaforo_counts.AMARILLO, semaforo_counts.VERDE, semaforo_counts.CONSOLIDADO],
                            backgroundColor: ['#D12D35', '#ED8B00', '#067014', '#2D6DF6']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: labelColor } },
                            datalabels: {
                                color: '#fff',
                                font: { weight: 'bold', size: 14 },
                                formatter: (value) => value > 0 ? value : ''
                            }
                        }
                    }
                });
            };

            // Helper to render Bar
            const renderBar = (ctxId, chartObj, dataFiltered) => {
                const entity_counts = {};
                dataFiltered.forEach(c => {
                    if (c.entidad) {
                        entity_counts[c.entidad] = (entity_counts[c.entidad] || 0) + 1;
                    }
                });

                const top_entities = Object.entries(entity_counts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10);

                const ctx = document.getElementById(ctxId).getContext('2d');
                if (chartObj) chartObj.destroy();
                return new Chart(ctx, {
                    type: 'bar',
                    plugins: [ChartDataLabels],
                    data: {
                        labels: top_entities.map(e => e[0]),
                        datasets: [{
                            label: 'Casos Detectados',
                            data: top_entities.map(e => e[1]),
                            backgroundColor: '#2D6DF6'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        layout: {
                            padding: {
                                right: 40 // Espacio para que no se corten los números
                            }
                        },
                        scales: {
                            x: { ticks: { color: labelColor }, grid: { color: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)' } },
                            y: { ticks: { color: labelColor }, grid: { display: false } }
                        },
                        plugins: {
                            legend: { labels: { color: labelColor } },
                            datalabels: {
                                color: labelColor,
                                font: { weight: 'bold', size: 12 },
                                anchor: 'end',
                                align: 'right',
                                formatter: (value) => value > 0 ? value : ''
                            }
                        }
                    }
                });
            };

            // 1. Data Historica (All)
            chartSemaforo = renderDoughnut('chart-semaforo', chartSemaforo, casos);
            chartEntidades = renderBar('chart-entidades', chartEntidades, casos);

            // 2. Data Hoy
            const todayStr = new Date().toISOString().split('T')[0];
            const casosHoy = casos.filter(c => (c.detected_at || '').startsWith(todayStr));
            
            chartSemaforoHoy = renderDoughnut('chart-semaforo-hoy', chartSemaforoHoy, casosHoy);
            chartEntidadesHoy = renderBar('chart-entidades-hoy', chartEntidadesHoy, casosHoy);
        }

        function loadAllData() {
            $.get('/api/casos', function(casos) {
                updateCharts(casos);
            }).fail(function() {
                console.error("Error cargando estadísticas");
            });
        }

    $(document).ready(function() {
        // Logic for Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        const themeLight = document.getElementById('theme-light');
        const themeDark = document.getElementById('theme-dark');

        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                themeDark.classList.add('active');
                themeLight.classList.remove('active');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                themeLight.classList.add('active');
                themeDark.classList.remove('active');
                localStorage.setItem('theme', 'light');
            }
            // Redibujar con los datos que ya tenemos sin volver a llamar a la API
            if (lastCasosData) updateCharts(lastCasosData);
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme) {
            setTheme(savedTheme);
        } else if (systemPrefersDark) {
            setTheme('dark');
        } else {
            setTheme('light');
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Carga inicial de datos
        loadAllData();
    });
</script>
</body>
</html>
